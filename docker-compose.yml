version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: triage-mongo
    ports:
      - "27017:27017"
    volumes:
      - triage_mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build: 
      context: ./triage-backend
      dockerfile: Dockerfile
    container_name: triage-backend
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/ai-health-triage
      - PORT=${PORT:-5000}
      - JWT_SECRET=DOCKER_LOCAL_JWT_SECRET_TESTING_KEY
      - JWT_REFRESH_SECRET=DOCKER_LOCAL_JWT_REFRESH_TESTING_KEY
      # Pull AI variables safely from local machine environment
      - GEMINI_API_KEY=${GEMINI_API_KEY:-""}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-""}
    depends_on:
      - mongodb
    volumes:
      # Optional bind mount to sync src folder changes without rebuilding
      - ./triage-backend/src:/usr/src/app/src
    restart: unless-stopped

  frontend:
    build: 
      context: ./triage-frontend
      dockerfile: Dockerfile
    container_name: triage-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    environment:
      # Note: Localhost correctly points to the external port on the user's host machine
      - VITE_API_URL=http://localhost:${PORT:-5000}/api
      - FRONTEND_PORT=${FRONTEND_PORT:-3000}
    depends_on:
      - backend
    volumes:
      # Bind mount for frontend hot reloading
      - ./triage-frontend/src:/usr/src/app/src
    restart: unless-stopped

volumes:
  triage_mongodb_data:
